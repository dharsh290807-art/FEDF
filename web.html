```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Browser Console</title>
<style>
    body {
        font-family: monospace;
        background: #1e1e1e;
        color: white;
        margin: 0;
        padding: 20px;
    }

    .console {
        width: 80%;
        margin: auto;
        background: black;
        padding: 20px;
        border-radius: 10px;
    }

    #output {
        min-height: 300px;
        border: 1px solid #444;
        padding: 10px;
        margin-bottom: 10px;
        overflow-y: auto;
    }

    input {
        width: 100%;
        padding: 10px;
        background: #222;
        color: white;
        border: none;
        outline: none;
    }
</style>
</head>
<body>

<div class="console">
    <div id="output"></div>
    <input type="text" id="command" placeholder="Type JavaScript and press Enter">
</div>

<script>
const output = document.getElementById("output");
const command = document.getElementById("command");

command.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        let cmd = command.value;
        try {
            let result = eval(cmd);
            output.innerHTML += `<div>> ${cmd}</div>`;
            output.innerHTML += `<div>${result}</div>`;
        } catch (error) {
            output.innerHTML += `<div style="color:red;">Error: ${error}</div>`;
        }
        command.value = "";
    }
});
</script>

</body>
</html>
