```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Browser Control</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    .browser {
        width: 90%;
        margin: 20px auto;
        background: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        border-radius: 10px;
        overflow: hidden;
    }

    .toolbar {
        display: flex;
        padding: 10px;
        background: #333;
    }

    .toolbar button {
        margin-right: 10px;
        padding: 8px 12px;
        border: none;
        cursor: pointer;
        background: #555;
        color: white;
        border-radius: 5px;
    }

    .toolbar input {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 5px;
    }

    iframe {
        width: 100%;
        height: 500px;
        border: none;
    }
</style>
</head>
<body>

<div class="browser">
    <div class="toolbar">
        <button onclick="goBack()">⬅ Back</button>
        <button onclick="goForward()">➡ Forward</button>
        <button onclick="refreshPage()">⟳ Refresh</button>
        <input type="text" id="urlBox" placeholder="Enter URL">
        <button onclick="loadPage()">Go</button>
    </div>

    <iframe id="browserFrame" src="https://example.com"></iframe>
</div>

<script>
    const frame = document.getElementById("browserFrame");

    function loadPage() {
        let url = document.getElementById("urlBox").value;
        if (!url.startsWith("http")) {
            url = "https://" + url;
        }
        frame.src = url;
    }

    function goBack() {
        frame.contentWindow.history.back();
    }

    function goForward() {
        frame.contentWindow.history.forward();
    }

    function refreshPage() {
        frame.contentWindow.location.reload();
    }
</script>

</body>
</html>
